name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: santostiago-dias
        password: ${{secrets.PASSWORD}}

    - uses: docker/setup-qemu-action@v3
      name: Set up QEMU
    
    - uses: docker/setup-buildx-action@v3
      name: Set Up Buildx
    
    - uses: docker/build-push-action@v4
      with:
        platforms: linux/amd64, linux/arm64
        context: ./api
        push: true
        tags: ghrc.io/santostiago-dias/cloud-api:latest

    - uses: docker/build-push-action@v4
      with:
        platforms: linux/amd64, linux/arm64
        context: ./frontend
        push: true
        tags: ghrc.io/santostiago-dias/cloud-frontend:latest


      
